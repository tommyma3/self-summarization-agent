experiment:
  name: qwen-bcplus-train
  seed: 7
  output_root: /124090467/self-summarization-agent/
  bc_plus_root: /124090467/self-summarization-agent/bc-plus

dataset:
  decrypted_path: /124090467/self-summarization-agent/bc-plus/data/browsecomp_plus_decrypted.jsonl
  offset: 0
  limit:
  shuffle: false
  train_limit: 200
  eval_limit: 10

retrieval:
  backend: faiss
  top_k: 5
  snippet_max_tokens: 512
  document_max_tokens: 8192
  snippet_tokenizer_path: /124090467/Qwen/Qwen3.5-9B
  index_path: /124090467/self-summarization-agent/bc-plus/indexes/qwen3-embedding-8b/corpus.shard*.pkl
  model_name: /124090467/Qwen/Qwen3-Embedding-8B
  normalize: true
  pooling: eos
  torch_dtype: bfloat16
  dataset_name: Tevatron/browsecomp-plus-corpus
  max_length: 8192

model:
  backend: transformers
  model_path: /124090467/Qwen/Qwen3.5-9B
  dtype: bfloat16
  device_map: auto
  max_new_tokens: 8192
  temperature: 0.7
  top_p: 0.95
  do_sample: true
  trust_remote_code: false
  enable_thinking: true

rollout:
  backend: vllm_offline
  gpu_ids: [2, 3, 4, 5]
  tensor_parallel_size: 4
  attention_backend: TORCH_SDPA
  max_model_len: 65536
  max_concurrent_episodes: 32
  max_new_tokens: 8192
  temperature: 0.7
  top_p: 0.95
  do_sample: true

runtime:
  context_threshold_tokens: 48000
  max_context_tokens: 65536
  tool_budget: 20

judge:
  enabled: true
  max_new_tokens: 4096
  temperature: 0.0
  top_p: 1.0
  do_sample: false

training:
  backend: fsdp2_context_parallel
  gpu_ids: [0, 1, 2, 3, 4, 5]
  fsdp_version: 2
  context_parallel_size: 6
  tensor_parallel_size: 1
  data_parallel_size: 1
  activation_checkpointing: true
  epochs: 10
  steps: 10
  group_size: 4
  gradient_accumulation_microbatch_size: 1
  learning_rate: 1.0e-6
  checkpoint_interval: 5
  eval_interval: 0
  max_grad_norm: 1.0
