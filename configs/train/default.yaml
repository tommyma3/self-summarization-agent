experiment:
  name: qwen-bcplus-train
  seed: 7
  output_root: /124090467/self-summarization-agent/
  bc_plus_root: /124090467/self-summarization-agent/bc-plus

dataset:
  decrypted_path: /124090467/self-summarization-agent/bc-plus/data/browsecomp_plus_decrypted.jsonl
  offset: 0
  limit: 128
  shuffle: true

retrieval:
  backend: faiss
  top_k: 5
  index_path: /124090467/self-summarization-agent/bc-plus/indexes/qwen3-embedding-8b/corpus.shard*.pkl
  model_name: /124090467/Qwen/Qwen3-Embedding-8B
  normalize: true
  pooling: eos
  torch_dtype: bfloat16
  dataset_name: Tevatron/browsecomp-plus-corpus
  max_length: 8192

model:
  backend: transformers
  model_path: /124090467/Qwen/Qwen3.5-9B
  dtype: bfloat16
  device_map: auto
  max_new_tokens: 4096
  temperature: 0.7
  top_p: 0.95
  do_sample: true
  trust_remote_code: false
  enable_thinking: true

runtime:
  context_threshold_tokens: 24000
  max_context_tokens: 32768
  tool_budget: 20

judge:
  enabled: true
  max_new_tokens: 512
  temperature: 0.0
  top_p: 1.0
  do_sample: false

training:
  steps: 10
  batch_size: 2
  group_size: 2
  learning_rate: 1.0e-6
  checkpoint_interval: 5
  eval_interval: 0
  max_grad_norm: 1.0
